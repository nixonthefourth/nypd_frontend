<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilian Login</title>
</head>
<body>
    <nav>
        <a href="../index.html">home</a>
        <a href="civ_login.html">login</a>
    </nav>

    <div>
        <h1>CIVILIAN LOGIN</h1>

        <form>
            <label for="uname">username *</label><br>
            <input type="text" name="uname" id="uname" placeholder="e.g. Jacknicks"><br>

            <label for="dob">dob *</label><br>
            <input type="date" name="dob" id="dob" placeholder="e.g. 1963-11-22"><br>

            <label for="password">password *</label><br>
            <input type="password" name="password" id="password" placeholder="input here"><br>

            <button type="submit">
                <a href="civ_dashboard.html">
                    LOG IN
                </a>
            </button>
        </form>
    </div>

    <div>
        <h3>
            <a href="civ_reg.html">first time here?</a>
        </h3>
    </div>

    <footer></footer>
</body>
