<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
</head>
<body>
    <nav>
        <a href="../index.html">home</a>
        <a href="admin_login.html">login</a>
    </nav>

    <div>
        <h1>ADMIN LOGIN</h1>

        <form>
            <label for="uname">username *</label><br>
            <input type="text" name="uname" id="uname" placeholder="e.g. officer.smith"><br>

            <label for="badge">badge number *</label><br>
            <input type="text" name="badge" id="badge" placeholder="e.g. NYPD00123"><br>

            <label for="password">password *</label><br>
            <input type="password" name="password" id="password" placeholder="input here"><br>

            <button type="submit">
                <a href="admin_dashboard.html">
                    LOG IN
                </a>
            </button>
        </form>
    </div>

    <footer></footer>
</body>
</html>
