<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilian Login</title>
    <link rel="stylesheet" href="../../styles/style_login.css">
</head>
<body>
    <nav>
        <a href="../../index.html">home</a>
        <a href="login.html">login</a>
    </nav>

    <div>
        <h1>CIVILIAN LOGIN</h1>

        <form id="civilian-login-form">
            <div>
                <label for="uname">username *</label>
                <input type="text" name="username" id="uname" placeholder="e.g. Jacknicks" required>
            </div>

            <div>
                <label for="dob">dob *</label>
                <input type="date" name="dob" id="dob" placeholder="e.g. 1963-11-22">
            </div>

            <div>
                <label for="password">password *</label>
                <input type="password" name="password" id="password" placeholder="input here" required>
            </div>

            <p id="auth-message" role="status" aria-live="polite"></p>

            <button type="submit">LOG IN</button>
        </form>
    </div>

    <div>
        <h3>
            <a href="reg.html">first time here?</a>
        </h3>
    </div>

    <footer></footer>
    <script src="../../scripts/civilian/auth.js"></script>
</body>
</html>
