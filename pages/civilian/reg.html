<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilian Registration</title>
    <link rel="stylesheet" href="../../styles/style_registration.css">
</head>
<body>
    <nav>
        <a href="../../index.html">home</a>
        <a href="login.html">login</a>
    </nav>

    <div>
        <h1>CIVILIAN REGISTRATION</h1>

        <form id="civilian-register-form">
            <h2>PERSONAL DETAILS</h2>
            <div class="form-section">
                <div class="field-group">
                    <label for="uname">username *</label>
                    <input type="text" name="username" id="uname" placeholder="e.g. Jacknicks" required>
                </div>

                <div class="field-group">
                    <label for="fname">first name *</label>
                    <input type="text" name="first_name" id="fname" placeholder="e.g. Jack" required>
                </div>

                <div class="field-group">
                    <label for="lname">last name *</label>
                    <input type="text" name="last_name" id="lname" placeholder="e.g. nicholson" required>
                </div>

                <div class="field-group">
                    <label for="dob">dob *</label>
                    <input type="date" name="dob" id="dob" placeholder="e.g. 1963-11-22" required>
                </div>

                <div class="field-group">
                    <label for="height">height (in) *</label>
                    <input type="number" name="height_inches" id="height" placeholder="e.g. 72" min="36" max="96" required>
                </div>

                <div class="field-group">
                    <label for="weight">weight (lbs) *</label>
                    <input type="number" name="weight_pounds" id="weight" placeholder="e.g. 153" min="50" max="500" required>
                </div>

                <div class="field-group">
                    <label for="eye_color">eye color *</label>
                    <input type="text" name="eyes_colour" id="eye_color" placeholder="e.g. green" required>
                </div>

                <div class="field-group">
                    <label for="license_number">license number *</label>
                    <input type="text" name="licence_number" id="license_number" placeholder="e.g. CA1234567" required>
                </div>

                <div class="field-group">
                    <label for="state_of_issue">state of issue *</label>
                    <input type="text" name="state_issue" id="state_of_issue" placeholder="e.g. california" required>
                </div>

                <div class="field-group">
                    <label for="password">password *</label>
                    <input type="password" name="password" id="password" placeholder="input here" required>
                </div>

                <div class="field-group">
                    <label for="confirm_password">confirm password *</label>
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="confirm" required>
                </div>
            </div>

            <h2>VEHICLE REG DETAILS</h2>
            <div class="form-section">
                <div class="field-group">
                    <label for="license_plate">license plate *</label>
                    <input type="text" name="license_plate" id="license_plate" placeholder="e.g. ABc123">
                </div>

                <div class="field-group">
                    <label for="veh_state_of_issue">state of issue *</label>
                    <input type="text" name="veh_state_of_issue" id="veh_state_of_issue" placeholder="e.g. new jersey">
                </div>

                <div class="field-group">
                    <label for="vin">vin *</label>
                    <input type="text" name="vin" id="vin" placeholder="e.g. 1ABCD12633B004352">
                </div>

                <div class="field-group">
                    <label for="veh_zip">zip code *</label>
                    <input type="text" name="veh_zip" id="veh_zip" placeholder="e.g. 12345">
                </div>

                <div class="field-group">
                    <label for="veh_street">street *</label>
                    <input type="text" name="veh_street" id="veh_street" placeholder="e.g. st. marks avenue">
                </div>

                <div class="field-group">
                    <label for="veh_house">house *</label>
                    <input type="text" name="veh_house" id="veh_house" placeholder="e.g. 28">
                </div>

                <div class="field-group">
                    <label for="veh_state">state *</label>
                    <input type="text" name="veh_state" id="veh_state" placeholder="e.g. new jersey">
                </div>

                <div class="field-group">
                    <label for="veh_city">city *</label>
                    <input type="text" name="veh_city" id="veh_city" placeholder="e.g. new jersey">
                </div>
            </div>

            <h2>CONTACT DETAILS</h2>
            <div class="form-section">
                <div class="field-group">
                    <label for="phone">phone number *</label>
                    <input type="tel" name="phone_number" id="phone" placeholder="e.g. 07412345178" required>
                </div>

                <div class="field-group">
                    <label for="email">email</label>
                    <input type="email" name="email" id="email" placeholder="e.g. myemail@mail.com" required>
                </div>

                <div class="field-group">
                    <label for="con_zip">zip code *</label>
                    <input type="text" name="zip_code" id="con_zip" placeholder="e.g. 12345" required>
                </div>

                <div class="field-group">
                    <label for="con_street">street *</label>
                    <input type="text" name="street" id="con_street" placeholder="e.g. nixon drive" required>
                </div>

                <div class="field-group">
                    <label for="con_house">house *</label>
                    <input type="text" name="house" id="con_house" placeholder="e.g. 1A" required>
                </div>

                <div class="field-group">
                    <label for="con_state">state *</label>
                    <input type="text" name="state" id="con_state" placeholder="e.g. indiana" required>
                </div>

                <div class="field-group">
                    <label for="con_city">city *</label>
                    <input type="text" name="city" id="con_city" placeholder="e.g. hawkins" required>
                </div>
            </div>

            <p id="auth-message" role="status" aria-live="polite"></p>

            <button type="submit">REGISTER</button>
        </form>
    </div>

    <footer></footer>
    <script src="../../scripts/civilian/auth.js"></script>
</body>
</html>
