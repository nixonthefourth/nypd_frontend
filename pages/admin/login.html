<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
</head>
<body>
    <nav>
        <a href="../../index.html">home</a>
        <a href="login.html">login</a>
    </nav>

    <div>
        <h1>ADMIN LOGIN</h1>

        <form id="admin-login-form">
            <label for="uname">username *</label><br>
            <input type="text" name="username" id="uname" placeholder="e.g. officer_user" required><br>

            <label for="badge">badge number *</label><br>
            <input type="text" name="badge_number" id="badge" placeholder="e.g. B001" required><br>

            <label for="password">password *</label><br>
            <input type="password" name="password" id="password" placeholder="input here" required><br>

            <p id="admin-auth-message" role="status" aria-live="polite"></p>

            <button type="submit">LOG IN</button>
        </form>
    </div>

    <footer></footer>
    <script src="../../scripts/admin/auth.js"></script>
</body>
</html>
